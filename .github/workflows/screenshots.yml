name: Update screenshots

on:
  schedule:
    - cron: '0 2 * * 0'  # Sunday 2 AM UTC
  push:
    paths:
      - 'src/content/work/*.md'  # re-run when spotlight entries change
  workflow_dispatch:             # manual trigger from Actions tab

jobs:
  screenshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Take screenshots
        run: node scripts/update-screenshots.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/screenshots/ src/data/commit-cache.json
          git diff --staged --quiet || (git commit -m "chore: update spotlight screenshots and commit cache" && git push)
